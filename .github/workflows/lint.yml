name: Roman Linting

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linting:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Or change to your Python version
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install black flake8 mypy
    
    # pep8, code formatting, and type checking
    - name: Run Black
      run: |
        black . --check
    
    # linting
    - name: Run Flake8
      run: |
        flake8 . --max-line-length=140

    # type checking
    # Add --ignore-missing-imports if you want to ignore missing type hints in third-party/old libraries
    - name: Run MyPy
      run: |
        pip install types-requests
        mypy .